<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Dashboard - LIVE TV</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000432">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #000432;
            color: #c8d0e7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
        }
        .dashboard-container {
            display: flex; flex-direction: column; height: 100%;
            background: #000432;
        }
        .quick-pairs-inline {
            display: flex; flex: 1 1 0%; gap: 4px;
            overflow-x: auto; scrollbar-width: none; padding-right: 6px;
        }
        .quick-pairs-inline::-webkit-scrollbar { display: none; }
        .quick-pair-btn {
            flex-grow: 1; background: #000432; color: #8892b0;
            border: 1px solid #ffffff; padding: 4px 8px;
            font-size: 10px; font-weight: bold; cursor: pointer;
            border-radius: 6px; white-space: nowrap; text-align: center;
        }
        .quick-pair-btn:hover { color: #c8d0e7; }
        .quick-pair-btn.active { color: #ffcc00; }
        .bottom-controls {
            display: flex; flex-wrap: nowrap;
            border: 1px solid #ffffff; border-radius: 14px;
            margin: 0 6px 6px 6px; height: 64px;
            background-color: #000432; flex-shrink: 0;
            gap: 4px; padding: 4px 6px;
            justify-content: flex-end; align-items: center;
            overflow-x: auto; scrollbar-width: none;
        }
        .bottom-controls::-webkit-scrollbar { display: none; }
        .control-item {
            flex: 0 0 auto; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: bold;
            padding: 0 2px; background: #000432; white-space: nowrap; gap: 2px;
        }
        .control-item svg { margin-right: 2px !important; width: 16px !important; height: 16px !important; }
        select, input {
            background-color: #000432; color: #c8d0e7;
            border: 1px solid #ffffff; padding: 4px; width: 44px;
            border-radius: 6px; text-align: center; font-family: inherit; outline: none;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        #conn-status { display: none !important; }
        .action-btn {
            border: 1px solid #ffffff; padding: 6px 8px !important;
            font-size: 10px; font-weight: bold; cursor: pointer;
            border-radius: 6px; margin: 0 2px !important;
            letter-spacing: 0.05em; background: #000432;
        }
        .btn-log { color: #8892b0; }
        .btn-call { color: #0ecb81; }
        .btn-put { color: #f6465d; }
        .chart-section {
            flex: 1; background-color: #000432; position: relative;
            overflow: hidden; min-height: 400px;
            display: flex; flex-direction: row;
            margin: 6px; border-radius: 14px; border: 1px solid #ffffff;
        }
        #canvas-wrapper { width: 100%; height: 100%; position: relative; }
        #custom-chart { width: 100%; height: 100%; display: block; }
        .floating-timeframe {
            position: absolute; bottom: 40px; right: 75px;
            display: flex; align-items: center;
            background: rgba(0,4,50,0.85); border: 1px solid #ffffff;
            border-radius: 8px; padding: 4px 8px; z-index: 20;
        }
        .floating-timeframe input {
            width: 55px; background: transparent; border: none;
            color: #c8d0e7; text-align: center; font-weight: bold;
            outline: none; padding-right: 2px;
        }
        .floating-timeframe input[type=number]::-webkit-inner-spin-button,
        .floating-timeframe input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: auto; opacity: 1; margin: 0;
        }
        .floating-timeframe input[type=number] { -moz-appearance: number-input; }
        #loading-text {
            color: #ffcc00; font-weight: bold; letter-spacing: 2px;
            z-index: 10; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; display: flex; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="chart-section">
        <div id="loading-text">
            <div id="loading-main">⚡ BOOTING TERMINAL...</div>
            <div id="loading-sub" style="font-size:11px;color:#8892b0;margin-top:8px;letter-spacing:1px;">Starting...</div>
            <div id="loading-bar-wrap" style="margin-top:12px;width:220px;height:6px;background:#0a1040;border-radius:4px;overflow:hidden;">
                <div id="loading-bar" style="height:100%;width:0%;background:#ffcc00;border-radius:4px;transition:width 0.4s;"></div>
            </div>
            <div id="loading-pct" style="margin-top:6px;font-size:10px;color:#ffcc00;">0%</div>
        </div>
        <div id="canvas-wrapper">
            <canvas id="custom-chart"></canvas>
        </div>
        <div class="floating-timeframe">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <input type="number" id="candle-time" value="5" placeholder="Time" aria-label="Candle Time Frame in Seconds" step="1">
        </div>
    </div>
    <div class="bottom-controls">
        <div class="quick-pairs-inline" id="quick-pairs-container">
            <button class="quick-pair-btn" data-val="1HZ10V">V10[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ15V">V15[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ25V">V25[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ30V">V30[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ50V">V50[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ75V">V75[1s]</button>
            <button class="quick-pair-btn" data-val="1HZ90V">V90[1s]</button>
            <button class="quick-pair-btn active" data-val="1HZ100V">V100[1s]</button>
        </div>
        <div class="control-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            <input type="number" id="trade-amount" value="1.00" placeholder="Amount ($)" aria-label="Trade Amount" step="0.01">
        </div>
        <div class="control-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M4 2h16v4L12 12l8 6v4H4v-4l8-6-8-6z"></path></svg>
            <input type="number" id="trade-expiry" value="60" placeholder="Expiry (s)" aria-label="Trade Expiry Time in Seconds">
        </div>
        <div class="control-item">
            <button id="show-trades-btn" class="action-btn btn-log" aria-label="Trades Log" style="display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
            <button id="trade-btn" class="action-btn btn-call" aria-label="Buy Call" style="display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#0ecb81" stroke="#0ecb81" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0px 0px 4px rgba(14,203,129,0.8));"><polygon points="12 4 2 20 22 20"></polygon></svg>
            </button>
            <button id="trade-btn-put" class="action-btn btn-put" aria-label="Sell Put" style="display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#f6465d" stroke="#f6465d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0px 0px 4px rgba(246,70,93,0.8));"><polygon points="12 20 2 4 22 4"></polygon></svg>
            </button>
        </div>
        <div class="control-item">
            <span id="balance-display" style="color:#0ecb81;font-weight:bold;">Loading...</span>
            <span id="conn-status">OFFLINE</span>
        </div>
    </div>
</div>

<div id="tradeModalOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000432;z-index:2001;"></div>
<div id="tradeModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90vw;max-width:420px;height:500px;background:#000432;border-radius:20px;z-index:2002;flex-direction:column;overflow:hidden;border:1px solid #ffffff;">
    <div style="padding:15px;background:#000432;color:#ffcc00;font-weight:800;font-size:12px;letter-spacing:0.1em;display:flex;justify-content:space-between;align-items:center;z-index:10;">
        <span>LIVE TRADE TERMINAL</span>
        <button id="close-modal-btn" style="background:transparent;border:none;color:#ffcc00;cursor:pointer;font-size:16px;">✕</button>
    </div>
    <div id="tradeList" style="flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;background:#000432;">
        <div style="color:#8892b0;text-align:center;padding:20px;font-size:12px;font-weight:bold;letter-spacing:0.05em;">NO TRADES RECORDED IN THIS SESSION</div>
    </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
var DERIV_APP_ID     = "33wuhc3RztQ6f2rwZijoR";
var DERIV_API_TOKEN  = "pat_af26ff5010877e4f07516004ea3f8ae9c6ab091f9b251c3d3c8384d372e5da57";
var DERIV_API_BASE   = "https://api.derivws.com";
var DERIV_ACCOUNT_ID = "DOT93156972";
var WS_PUBLIC_URL    = "wss://ws.derivws.com/websockets/v3?app_id=1089";

// ── STATE ───────────────────────────────────────────────────────────────────
var ws               = null;
var currentPair      = "1HZ100V";
var tickSubscriptions = {};
var tradeHistory     = [];
var marketData       = {};
var serverTimeOffset = 0;
var _balanceStarted  = false;
var _pairsLoaded     = 0;
var _lastFetchedSymbol = null;
var _pendingTradeReqs  = {};
var _lastProposalReqId = null;
var _lastTradeExpirySecs = 0;

var trackedPairs = ["1HZ10V","1HZ15V","1HZ25V","1HZ30V","1HZ50V","1HZ75V","1HZ90V","1HZ100V"];

// ── UI REFS ─────────────────────────────────────────────────────────────────
var candleTimeInput  = document.getElementById('candle-time');
var balanceDisplay   = document.getElementById('balance-display');
var connStatus       = document.getElementById('conn-status');
var loadingText      = document.getElementById('loading-text');

// ── BOOT PROGRESS ────────────────────────────────────────────────────────────
function setBootProgress(pct, msg) {
    var bar   = document.getElementById('loading-bar');
    var sub   = document.getElementById('loading-sub');
    var pctEl = document.getElementById('loading-pct');
    if (bar)   bar.style.width  = pct + '%';
    if (sub)   sub.innerText    = msg;
    if (pctEl) pctEl.innerText  = pct + '%';
}

// ── BALANCE via REST ─────────────────────────────────────────────────────────
function fetchBalanceREST() {
    fetch(DERIV_API_BASE + '/trading/v1/options/accounts', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + DERIV_API_TOKEN,
            'Deriv-App-ID':  DERIV_APP_ID
        }
    })
    .then(function(r) { return r.json(); })
    .then(function(json) {
        var accounts = json.data || [];
        var account  = null;
        for (var i = 0; i < accounts.length; i++) {
            if (accounts[i].account_id === DERIV_ACCOUNT_ID) { account = accounts[i]; break; }
        }
        if (!account && accounts.length > 0) account = accounts[0];
        if (account && account.balance !== undefined) {
            balanceDisplay.innerText = '$' + parseFloat(account.balance).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
        } else {
            balanceDisplay.innerText = 'N/A';
        }
    })
    .catch(function(e) {
        console.warn('Balance REST failed:', e.message);
        balanceDisplay.innerText = 'ERR';
    });
}

// ── CANVAS ───────────────────────────────────────────────────────────────────
var canvas     = document.getElementById('custom-chart');
var ctx        = canvas ? canvas.getContext('2d') : null;
var canvasWidth, canvasHeight;

function resizeCanvas() {
    if (!canvas) return;
    var wrapper = document.getElementById('canvas-wrapper');
    if (!wrapper) return;
    canvasWidth  = wrapper.clientWidth;
    canvasHeight = wrapper.clientHeight;
    var dpr = window.devicePixelRatio || 1;
    canvas.width  = canvasWidth  * dpr;
    canvas.height = canvasHeight * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width  = canvasWidth  + 'px';
    canvas.style.height = canvasHeight + 'px';
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    drawChart();
}
window.addEventListener('resize', resizeCanvas);

function getCandleDuration() { return parseInt(candleTimeInput.value) || 5; }

function drawChart() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);

    var currentCandles = marketData[currentPair] || [];
    if (currentCandles.length === 0) {
        loadingText.style.display = 'flex';
        return;
    }
    loadingText.style.display = 'none';

    var yAxisWidth    = 60;
    var xAxisHeight   = 25;
    var chartAreaWidth = canvasWidth * 0.70;
    var chartHeight   = canvasHeight - xAxisHeight;
    var candleWidth   = 6;
    var candleSpacing = 4;
    var totalCandleWidth = candleWidth + candleSpacing;
    var maxVisibleCandles = Math.floor(chartAreaWidth / totalCandleWidth);
    var visibleCandles = currentCandles.slice(-maxVisibleCandles);

    var minPrice = Infinity, maxPrice = -Infinity;
    visibleCandles.forEach(function(c) {
        if (c.low  < minPrice) minPrice = c.low;
        if (c.high > maxPrice) maxPrice = c.high;
    });
    var priceRange = maxPrice - minPrice || 1;
    var paddedMin  = minPrice - priceRange * 0.1;
    var paddedMax  = maxPrice + priceRange * 0.1;
    var paddedRange = paddedMax - paddedMin;

    function getY(price) {
        return chartHeight - ((price - paddedMin) / paddedRange) * chartHeight;
    }

    var dec = paddedMax < 10 ? 5 : (paddedMax < 1000 ? 3 : 2);

    // Grid lines & Y labels
    ctx.fillStyle = '#888';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    for (var i = 1; i < 6; i++) {
        var yLine = (chartHeight / 6) * i;
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 0.2;
        ctx.beginPath(); ctx.moveTo(0, yLine); ctx.lineTo(canvasWidth - yAxisWidth, yLine); ctx.stroke();
        var priceAtLine = paddedMax - paddedRange * (i / 6);
        ctx.fillText(priceAtLine.toFixed(dec), canvasWidth - yAxisWidth + 6, yLine);
    }

    // 70% divider
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(chartAreaWidth, 0); ctx.lineTo(chartAreaWidth, chartHeight); ctx.stroke();
    ctx.setLineDash([]);

    // Axes
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, chartHeight); ctx.lineTo(canvasWidth, chartHeight);
    ctx.moveTo(canvasWidth - yAxisWidth, 0); ctx.lineTo(canvasWidth - yAxisWidth, chartHeight);
    ctx.stroke();

    // Candles
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    var lastCandle = currentCandles[currentCandles.length - 1];

    for (var ci = 0; ci < visibleCandles.length; ci++) {
        var c = visibleCandles[ci];
        var isUp  = c.close >= c.open;
        var color = isUp ? '#0ecb81' : '#f6465d';
        ctx.fillStyle = color; ctx.strokeStyle = color;
        ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        var x = chartAreaWidth - ((visibleCandles.length - ci) * totalCandleWidth);
        var yOpen  = getY(c.open);
        var yClose = getY(c.close);
        var yHigh  = getY(c.high);
        var yLow   = getY(c.low);
        var bodyTop    = Math.min(yOpen, yClose);
        var bodyBottom = Math.max(yOpen, yClose);
        var bodyHeight = Math.max(1, bodyBottom - bodyTop);

        ctx.beginPath(); ctx.moveTo(x + candleWidth/2, yHigh); ctx.lineTo(x + candleWidth/2, yLow); ctx.stroke();
        ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);

        if (ci % 12 === 0 || ci === visibleCandles.length - 1) {
            ctx.textAlign = (ci === visibleCandles.length - 1) ? 'right' : 'center';
            var date  = new Date(c.time * 1000);
            var hh    = date.getHours().toString().padStart(2,'0');
            var mm    = date.getMinutes().toString().padStart(2,'0');
            var ss    = date.getSeconds().toString().padStart(2,'0');
            ctx.fillStyle = '#888';
            ctx.fillText(hh+':'+mm+':'+ss, x + candleWidth/2, chartHeight + 6);
        }
    }

    // Open trade lines
    if (tradeHistory.length > 0) {
        var lastCandleX       = chartAreaWidth - totalCandleWidth;
        var lastCandleCenterX = lastCandleX + candleWidth / 2;
        var candleDur         = getCandleDuration();
        tradeHistory.forEach(function(t) {
            if (t.status !== 'OPEN' || !t.expiry) return;
            var secondsDiff = t.expiry - lastCandle.time;
            var lineX = lastCandleCenterX + (secondsDiff / candleDur) * totalCandleWidth;
            var tColor = t.type === 'CALL' ? '#0ecb81' : '#f6465d';
            if (lineX > 0 && lineX < canvasWidth) {
                ctx.strokeStyle = tColor; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
                ctx.beginPath(); ctx.moveTo(lineX, 0); ctx.lineTo(lineX, chartHeight); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = tColor; ctx.font = 'bold 9px sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText('EXP', lineX, chartHeight - 2);
            }
            if (t.entry_spot && t.entry_time) {
                var entryY = getY(t.entry_spot);
                var entrySecondsDiff = t.entry_time - lastCandle.time;
                var entryX = lastCandleCenterX + (entrySecondsDiff / candleDur) * totalCandleWidth;
                if (entryY > 0 && entryY < chartHeight) {
                    ctx.strokeStyle = tColor; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(entryX, entryY); ctx.lineTo(Math.min(lineX, canvasWidth), entryY); ctx.stroke();
                    ctx.fillStyle = tColor;
                    ctx.beginPath(); ctx.arc(entryX, entryY, 2.5, 0, Math.PI*2); ctx.fill();
                }
            }
        });
    }

    // Price label + timer
    var currentPrice = lastCandle.close;
    var currentY     = getY(currentPrice);
    var isUpNow      = currentPrice >= lastCandle.open;
    var boxColor     = isUpNow ? '#0ecb81' : '#f6465d';

    ctx.strokeStyle = boxColor; ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(0, currentY); ctx.lineTo(canvasWidth - yAxisWidth, currentY); ctx.stroke();
    ctx.setLineDash([]);

    var duration          = getCandleDuration();
    var currentServerTime = Math.floor(Date.now()/1000) + serverTimeOffset;
    var remaining         = Math.max(0, (lastCandle.time + duration) - currentServerTime);
    var rmins = Math.floor(remaining/60).toString().padStart(2,'0');
    var rsecs = (remaining % 60).toString().padStart(2,'0');
    var timerText = rmins + ':' + rsecs;

    var labelHeight = 34;
    var labelY = currentY - labelHeight/2;
    ctx.fillStyle = boxColor;
    ctx.fillRect(canvasWidth - yAxisWidth, labelY, yAxisWidth, labelHeight);
    ctx.beginPath();
    ctx.moveTo(canvasWidth - yAxisWidth, currentY);
    ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY - 5);
    ctx.lineTo(canvasWidth - yAxisWidth + 5, currentY + 5);
    ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
    ctx.font = 'bold 11px sans-serif'; ctx.textBaseline = 'top';
    ctx.fillText(currentPrice.toFixed(dec), canvasWidth - yAxisWidth/2 + 2, labelY + 4);
    ctx.font = '10px monospace';
    ctx.fillText(timerText, canvasWidth - yAxisWidth/2 + 2, labelY + 18);
}

// ── DATA PROCESSORS ──────────────────────────────────────────────────────────
function processHistory(symbol, times, prices) {
    var duration = getCandleDuration();
    if (symbol === currentPair && times.length > 0) {
        serverTimeOffset = times[times.length-1] - Math.floor(Date.now()/1000);
    }
    var candleMap = new Map();
    for (var i = 0; i < times.length; i++) {
        var group = Math.floor(times[i] / duration) * duration;
        var p = prices[i];
        if (!candleMap.has(group)) {
            candleMap.set(group, {time:group, open:p, high:p, low:p, close:p});
        } else {
            var cd = candleMap.get(group);
            cd.high  = Math.max(cd.high, p);
            cd.low   = Math.min(cd.low,  p);
            cd.close = p;
        }
    }
    marketData[symbol] = Array.from(candleMap.values()).sort(function(a,b){ return a.time - b.time; });
}

function processLiveTick(symbol, epoch, price) {
    if (symbol === currentPair) serverTimeOffset = epoch - Math.floor(Date.now()/1000);
    var candles = marketData[symbol];
    if (!candles || candles.length === 0) return;
    var duration  = getCandleDuration();
    var group     = Math.floor(epoch / duration) * duration;
    var lastCandle = candles[candles.length-1];
    if (group < lastCandle.time) return;
    if (group === lastCandle.time) {
        lastCandle.high  = Math.max(lastCandle.high,  price);
        lastCandle.low   = Math.min(lastCandle.low,   price);
        lastCandle.close = price;
    } else {
        candles.push({time:group, open:price, high:price, low:price, close:price});
        if (candles.length > 2500) candles.shift();
    }
    if (symbol === currentPair) drawChart();
}

function fetchPairData(symbol) {
    marketData[symbol] = [];
    _lastFetchedSymbol = symbol;
    if (tickSubscriptions[symbol]) {
        ws.send(JSON.stringify({forget: tickSubscriptions[symbol]}));
        delete tickSubscriptions[symbol];
    }
    ws.send(JSON.stringify({ticks_history:symbol, end:"latest", count:2500, style:"ticks", subscribe:1}));
}

function switchPairView(newPair) {
    currentPair = newPair;
    if (!marketData[newPair] || marketData[newPair].length === 0) {
        loadingText.style.display = 'flex';
    } else {
        loadingText.style.display = 'none';
        drawChart();
    }
}

// ── WEBSOCKET ────────────────────────────────────────────────────────────────
function connect() {
    setBootProgress(20, 'Connecting to market...');

    // Use public app_id=1089 for tick data (no auth needed)
    ws = new WebSocket(WS_PUBLIC_URL);

    ws.onopen = function() {
        setBootProgress(40, 'Connected — loading pairs...');
        connStatus.innerText = 'ONLINE';
        connStatus.style.background = '#0ecb81';
        _pairsLoaded = 0;
        resizeCanvas();

        // Subscribe to all pairs
        var fetched = 0;
        trackedPairs.forEach(function(sym) {
            fetchPairData(sym);
            fetched++;
            setBootProgress(40 + Math.floor((fetched / trackedPairs.length) * 50), 'Loading ' + sym + '...');
        });

        // Fetch balance via REST (PAT token works here)
        fetchBalanceREST();
        if (!_balanceStarted) {
            _balanceStarted = true;
            setInterval(fetchBalanceREST, 15000);
        }
    };

    ws.onmessage = function(msg) {
        var data = JSON.parse(msg.data);
        if (data.error) {
            var code = data.error.code || '';
            if (code === 'AlreadySubscribed') return;
            if (code === 'RateLimit') { console.warn('Rate limit hit'); return; }
            if (code === 'InvalidContractParameters') {
                alert('⚠️ PARAMETER ERROR: Try changing the expiry duration.');
                return;
            }
            console.warn('API error:', data.error.message);
            return;
        }

        var msgType = data.msg_type;

        if (msgType === 'history' && data.history) {
            var symbol = (data.echo_req && data.echo_req.ticks_history) || _lastFetchedSymbol || currentPair;
            processHistory(symbol, data.history.times, data.history.prices);
            _pairsLoaded++;
            var pct = 40 + Math.floor((_pairsLoaded / trackedPairs.length) * 55);
            setBootProgress(Math.min(pct, 95), 'Loaded ' + _pairsLoaded + ' / ' + trackedPairs.length + ' pairs...');
            if (symbol === currentPair) {
                setBootProgress(100, 'Terminal ready!');
                setTimeout(function() { loadingText.style.display = 'none'; }, 500);
                drawChart();
            }
        }

        if (msgType === 'tick') {
            var sym = data.tick.symbol;
            tickSubscriptions[sym] = data.tick.id;
            processLiveTick(sym, data.tick.epoch, data.tick.quote);
        }

        if (msgType === 'balance' && data.balance) {
            balanceDisplay.innerText = '$' + data.balance.balance.toLocaleString(undefined, {minimumFractionDigits:2});
        }

        if (msgType === 'proposal' && data.proposal && data.proposal.id) {
            var pReqId = data.req_id;
            var useReqId = (pReqId && _pendingTradeReqs[pReqId]) ? pReqId :
                           (_lastProposalReqId && _pendingTradeReqs[_lastProposalReqId]) ? _lastProposalReqId : null;
            if (useReqId) {
                ws.send(JSON.stringify({buy: data.proposal.id, price: data.proposal.ask_price, req_id: useReqId}));
            }
        }

        if (msgType === 'buy' && data.buy) {
            var cid     = data.buy.contract_id;
            var reqMeta = (data.echo_req && data.echo_req.req_id) ? _pendingTradeReqs[data.echo_req.req_id] : null;
            var type    = (reqMeta && reqMeta.type) || 'CALL';
            if (reqMeta && data.echo_req.req_id) delete _pendingTradeReqs[data.echo_req.req_id];
            var cst = Math.floor(Date.now()/1000) + serverTimeOffset;
            tradeHistory.push({id:cid, type:type, stake:data.buy.buy_price, status:'OPEN',
                profit:0, expiry:cst + _lastTradeExpirySecs, entry_spot:null, entry_time:cst});
            ws.send(JSON.stringify({proposal_open_contract:1, contract_id:cid, subscribe:1, req_id:99}));
            updateTradeUI();
            console.log('✅ Trade:', cid, type, data.buy.buy_price);
        }

        if (msgType === 'proposal_open_contract' && data.proposal_open_contract) {
            var poc = data.proposal_open_contract;
            var t   = tradeHistory.find(function(x){ return x.id === poc.contract_id; });
            if (t) {
                t.profit = poc.profit;
                t.status = poc.is_sold ? (poc.profit > 0 ? 'WON' : 'LOST') : 'OPEN';
                if (poc.date_expiry) t.expiry     = poc.date_expiry;
                if (poc.date_start)  t.entry_time = poc.date_start;
                if (poc.entry_tick)  t.entry_spot = poc.entry_tick;
                updateTradeUI();
            }
        }
    };

    ws.onclose = function() {
        connStatus.innerText = 'OFFLINE';
        connStatus.style.background = '#f6465d';
        _pairsLoaded = 0;
        setBootProgress(0, 'Reconnecting...');
        setTimeout(connect, 3000);
    };

    ws.onerror = function() {
        console.warn('WebSocket error');
    };
}

// ── TRADE EXECUTION ──────────────────────────────────────────────────────────
function executeTrade(type) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('Please wait, connecting to server...');
        return;
    }
    var stake      = parseFloat(document.getElementById('trade-amount').value) || 1;
    var expirySecs = parseInt(document.getElementById('trade-expiry').value) || 60;
    var reqId      = Math.floor(Math.random() * 1000000000);
    _pendingTradeReqs[reqId]  = {type: type};
    _lastProposalReqId        = reqId;
    _lastTradeExpirySecs      = expirySecs;
    ws.send(JSON.stringify({
        proposal:1, amount:Number(stake), basis:'stake',
        contract_type:type, currency:'USD',
        duration:expirySecs, duration_unit:'s',
        symbol:currentPair, req_id:reqId
    }));
}

// ── TRADE UI ─────────────────────────────────────────────────────────────────
function updateTradeUI() {
    var list = document.getElementById('tradeList');
    if (tradeHistory.length === 0) {
        list.innerHTML = '<div style="color:#8892b0;text-align:center;padding:20px;font-size:12px;font-weight:bold;letter-spacing:0.05em;">NO TRADES RECORDED IN THIS SESSION</div>';
        return;
    }
    var html = '';
    tradeHistory.slice().reverse().forEach(function(t) {
        var color = t.status === 'OPEN' ? '#ffcc00' : (t.status === 'WON' ? '#0ecb81' : '#f6465d');
        var pColor = t.profit > 0 ? '#0ecb81' : (t.profit < 0 ? '#f6465d' : 'white');
        html += '<div style="display:flex;justify-content:space-between;background:#000432;padding:12px;border-radius:10px;border-left:3px solid '+color+';margin-bottom:10px;">'
            + '<div style="display:flex;flex-direction:column;gap:4px;">'
            + '<span style="font-weight:bold;color:white;font-size:12px;">'+t.type+' <span style="color:#888;font-size:10px;">#'+t.id+'</span></span>'
            + '<span style="color:#aaa;font-size:10px;">STAKE: $'+t.stake.toFixed(2)+'</span>'
            + '</div>'
            + '<div style="display:flex;flex-direction:column;gap:4px;text-align:right;">'
            + '<span style="font-weight:bold;font-size:12px;color:'+color+';">'+t.status+'</span>'
            + '<span style="font-weight:bold;font-size:12px;color:'+pColor+';">$'+t.profit.toFixed(2)+'</span>'
            + '</div></div>';
    });
    list.innerHTML = html;
}

// ── EVENT LISTENERS ──────────────────────────────────────────────────────────
document.getElementById('trade-btn').addEventListener('click', function(){ executeTrade('CALL'); });
document.getElementById('trade-btn-put').addEventListener('click', function(){ executeTrade('PUT'); });

document.getElementById('show-trades-btn').addEventListener('click', function() {
    document.getElementById('tradeModal').style.display = 'flex';
    document.getElementById('tradeModalOverlay').style.display = 'block';
    updateTradeUI();
});
document.getElementById('close-modal-btn').addEventListener('click', function() {
    document.getElementById('tradeModal').style.display = 'none';
    document.getElementById('tradeModalOverlay').style.display = 'none';
});
document.getElementById('tradeModalOverlay').addEventListener('click', function() {
    document.getElementById('tradeModal').style.display = 'none';
    document.getElementById('tradeModalOverlay').style.display = 'none';
});

candleTimeInput.addEventListener('change', function() {
    loadingText.style.display = 'flex';
    if (ws && ws.readyState === WebSocket.OPEN) {
        marketData = {};
        fetchPairData(currentPair);
    }
});

var quickPairBtns = document.querySelectorAll('.quick-pair-btn');
quickPairBtns.forEach(function(btn) {
    btn.addEventListener('click', function(e) {
        var newPair = e.currentTarget.getAttribute('data-val');
        quickPairBtns.forEach(function(b){ b.classList.remove('active'); });
        e.currentTarget.classList.add('active');
        switchPairView(newPair);
    });
});

setInterval(function() {
    if (marketData[currentPair] && marketData[currentPair].length > 0) drawChart();
}, 1000);

// ── BOOT ─────────────────────────────────────────────────────────────────────
connect();
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(){});
    });
}

function resolveDerivSymbol(pair) {
    var reverseMap = {
        'V10':'1HZ10V','V15':'1HZ15V','V25':'1HZ25V','V30':'1HZ30V',
        'V50':'1HZ50V','V75':'1HZ75V','V90':'1HZ90V','V100':'1HZ100V',
        'V10[1s]':'1HZ10V','V15[1s]':'1HZ15V','V25[1s]':'1HZ25V','V30[1s]':'1HZ30V',
        'V50[1s]':'1HZ50V','V75[1s]':'1HZ75V','V90[1s]':'1HZ90V','V100[1s]':'1HZ100V',
        '10V':'1HZ10V','15V':'1HZ15V','25V':'1HZ25V','30V':'1HZ30V',
        '50V':'1HZ50V','75V':'1HZ75V','90V':'1HZ90V','100V':'1HZ100V'
    };
    var apiSymbol = reverseMap[pair] || reverseMap[pair.toUpperCase()];
    if (!apiSymbol) {
        var num = pair.replace(/[^0-9]/g,'');
        if (num) apiSymbol = '1HZ' + num + 'V';
    }
    return apiSymbol || null;
}

function applyPairSelection(pair) {
    var apiSymbol = resolveDerivSymbol(pair);
    if (!apiSymbol) return;
    var btn = document.querySelector('.quick-pair-btn[data-val="' + apiSymbol + '"]');
    if (btn) btn.click();
}

window.addEventListener('message', function(e) {
    var pair = e.data && e.data.trinityOS_pair;
    if (!pair) return;
    applyPairSelection(pair);
});

window.addEventListener('storage', function(e) {
    if (e.key !== 'trinityOS_selected_pair' || !e.newValue) return;
    applyPairSelection(e.newValue.trim());
});
</script>
